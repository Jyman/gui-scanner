name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          uv sync
          uv add --dev pyinstaller

      - name: Generate icon
        run: uv run python generate_icon.py

      - name: Build exe
        run: uv run python -m PyInstaller yinhu.spec --clean --noconfirm

      - name: Compute hash
        shell: pwsh
        run: |
          $hash = Get-FileHash dist/yinhu.exe -Algorithm SHA256
          "$($hash.Hash)  yinhu.exe" | Out-File -FilePath dist/yinhu.exe.sha256 -Encoding ascii

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yinhu-windows
          path: |
            dist/yinhu.exe
            dist/yinhu.exe.sha256

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/yinhu.exe
            dist/yinhu.exe.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
